version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    ignore:
      # eslint-plugin-jsx-a11y does not declare eslint@10 peer support yet
      - dependency-name: eslint
        update-types: [version-update:semver-major]
      - dependency-name: "@eslint/js"
        update-types: [version-update:semver-major]
  - package-ecosystem: npm
    directory: /docs-app
    schedule:
      interval: weekly
  - package-ecosystem: npm
    directory: /fixtures/consumer
    schedule:
      interval: weekly
  - package-ecosystem: npm
    directory: /packages/footer
    schedule:
      interval: weekly
