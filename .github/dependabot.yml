version: 2

# @paper-design/shaders-react is pinned by @tollerud/ui's peer dependency and
# must move in lockstep (peer + all consumers) — never bumped independently. It
# is ignored in every directory below and bumped manually with a ui release.
#
# `typescript` majors are held everywhere: lint runs on typescript-eslint, which
# has no TypeScript 7-compatible release yet (peer caps at <6.1.0). Bump TS +
# typescript-eslint together once support ships. Minor/patch TS still flows.

updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: daily
    groups:
      # Bundle all minor + patch bumps into one PR per run (daily, auto-merged).
      # Majors still open individually so they get reviewed on their own.
      root-npm:
        patterns: ["*"]
        update-types: [minor, patch]
    ignore:
      # eslint-plugin-jsx-a11y does not declare eslint@10 peer support yet
      - dependency-name: eslint
        update-types: [version-update:semver-major]
      - dependency-name: "@eslint/js"
        update-types: [version-update:semver-major]
      # typescript-eslint has no TypeScript 7 support yet — hold the TS major
      - dependency-name: typescript
        update-types: [version-update:semver-major]
      # Pinned by @tollerud/ui's peer — bump in lockstep, not independently.
      - dependency-name: "@paper-design/shaders-react"
  - package-ecosystem: npm
    directory: /docs-app
    schedule:
      interval: daily
    groups:
      docs-app:
        patterns: ["*"]
        update-types: [minor, patch]
    ignore:
      - dependency-name: typescript
        update-types: [version-update:semver-major]
      - dependency-name: "@paper-design/shaders-react"
  - package-ecosystem: npm
    directory: /fixtures/consumer
    schedule:
      interval: daily
    groups:
      consumer-fixture:
        patterns: ["*"]
        update-types: [minor, patch]
    ignore:
      - dependency-name: typescript
        update-types: [version-update:semver-major]
      - dependency-name: "@paper-design/shaders-react"
  - package-ecosystem: npm
    directory: /packages/footer
    schedule:
      interval: daily
    groups:
      footer:
        patterns: ["*"]
        update-types: [minor, patch]
    ignore:
      - dependency-name: typescript
        update-types: [version-update:semver-major]
      - dependency-name: "@paper-design/shaders-react"
  - package-ecosystem: npm
    directory: /packages/email
    schedule:
      interval: daily
    groups:
      email:
        patterns: ["*"]
        update-types: [minor, patch]
    ignore:
      - dependency-name: typescript
        update-types: [version-update:semver-major]
      - dependency-name: "@paper-design/shaders-react"
