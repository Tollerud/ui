name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - run: npm ci --legacy-peer-deps

      - run: npm run validate

      - name: Verify docs site asset paths
        run: |
          grep -oE 'docs/[^"?'\'' ]+\.(jsx|css|js)' index.html | sort -u | while read -r file; do
            if [ ! -f "$file" ]; then
              echo "Missing docs asset referenced in index.html: $file"
              exit 1
            fi
          done

      - name: Verify npm tarball includes registry
        run: |
          npm pack --dry-run 2>&1 | tee /tmp/pack.txt
          grep -q 'registry.json' /tmp/pack.txt
          grep -q 'dist/index.js' /tmp/pack.txt
          grep -q 'GETTING_STARTED.md' /tmp/pack.txt
