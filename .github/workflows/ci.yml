name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json

      - run: corepack enable && corepack prepare npm@11.16.0 --activate

      - run: npm ci

      - run: npm run validate

      - name: Verify npm tarball contents
        run: |
          npm pack --dry-run 2>&1 | tee /tmp/pack.txt
          grep -q 'dist/index.js' /tmp/pack.txt
          grep -q 'dist/button.js' /tmp/pack.txt
          grep -q 'globals.css' /tmp/pack.txt
          grep -q 'globals-v3.css' /tmp/pack.txt
          grep -q 'GETTING_STARTED.md' /tmp/pack.txt

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json

      - run: corepack enable && corepack prepare npm@11.16.0 --activate

      - run: npm ci

      - run: npm run build

      - run: npx playwright install chromium --with-deps

      - run: npm run test:e2e
