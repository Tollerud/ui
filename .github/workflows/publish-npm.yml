name: Publish npm package

on:
  push:
    branches: [main]
    paths:
      - 'package.json'
      - 'components/**'
      - 'globals.css'
      - 'tokens.css'
      - 'lib/**'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm ci

      - name: Check if version already published
        id: version_check
        run: |
          LOCAL=$(node -p "require('./package.json').version")
          PUBLISHED=$(npm view @tollerud/design-system version 2>/dev/null || echo "0.0.0")
          echo "local=$LOCAL" >> $GITHUB_OUTPUT
          echo "published=$PUBLISHED" >> $GITHUB_OUTPUT
          if [ "$LOCAL" = "$PUBLISHED" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "Version $LOCAL already on npm — skipping publish."
          else
            echo "skip=false" >> $GITHUB_OUTPUT
            echo "Publishing $LOCAL (was $PUBLISHED)."
          fi

      - run: npm run build
        if: steps.version_check.outputs.skip == 'false'

      - name: Diagnose npm auth
        if: steps.version_check.outputs.skip == 'false'
        run: |
          echo "//registry.npmjs.org/:_authToken=${{ secrets.NPM_TOKEN }}" > ~/.npmrc
          echo "=== whoami ==="
          npm whoami || echo "whoami failed"
          echo "=== token type check ==="
          npm access ls-packages 2>&1 | head -5 || true

      - name: Publish to npm
        if: steps.version_check.outputs.skip == 'false'
        run: |
          npm publish --access public
