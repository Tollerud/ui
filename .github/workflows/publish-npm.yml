name: Publish npm package

on:
  push:
    branches: [main]
    paths:
      - 'package.json'
      - 'package-lock.json'
      - 'components/**'
      - 'lib/**'
      - 'types/**'
      - 'globals.css'
      - 'tokens.css'
      - 'tollerud-preset.js'
      - 'tsup.config.ts'
      - 'tsconfig.build.json'
      - 'vitest.config.ts'
      - 'eslint.config.js'
      - 'test/**'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - run: npm ci --legacy-peer-deps

      - name: Check if version already published
        id: version_check
        run: |
          LOCAL=$(node -p "require('./package.json').version")
          PUBLISHED=$(npm view @tollerud/ui version 2>/dev/null || echo "0.0.0")
          echo "local=$LOCAL" >> $GITHUB_OUTPUT
          echo "published=$PUBLISHED" >> $GITHUB_OUTPUT
          if [ "$LOCAL" = "$PUBLISHED" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "Version $LOCAL already on npm — skipping publish."
          else
            echo "skip=false" >> $GITHUB_OUTPUT
            echo "Publishing $LOCAL (was $PUBLISHED)."
          fi

      - run: npm run typecheck
        if: steps.version_check.outputs.skip == 'false'

      - run: npm run lint
        if: steps.version_check.outputs.skip == 'false'

      - run: npm run test
        if: steps.version_check.outputs.skip == 'false'

      - run: npm run build
        if: steps.version_check.outputs.skip == 'false'

      - name: Publish to npm
        if: steps.version_check.outputs.skip == 'false'
        run: |
          echo "//registry.npmjs.org/:_authToken=${{ secrets.NPM_TOKEN }}" > ~/.npmrc
          npm publish --access public --provenance

      - name: Create GitHub Release
        if: steps.version_check.outputs.skip == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=${{ steps.version_check.outputs.local }}
          gh release create "v${VERSION}" \
            --title "v${VERSION}" \
            --generate-notes
