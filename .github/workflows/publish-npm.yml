name: Publish npm package

on:
  push:
    branches: [main]
    paths:
      - 'package.json'
      - 'package-lock.json'
      - 'components/**'
      - 'lib/**'
      - 'types/**'
      - 'globals.css'
      - 'globals-v3.css'
      - 'globals-v4.css'
      - 'globals-layers.css'
      - 'tokens.css'
      - 'tollerud-preset.js'
      - 'tsup.config.ts'
      - 'tsconfig.build.json'
      - 'vitest.config.ts'
      - 'eslint.config.js'
      - 'test/**'
      - 'registry.json'
      - 'components.json'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - run: npm ci

      - run: npm run sync:registry

      - name: Check if version already published
        id: version_check
        run: |
          LOCAL=$(node -p "require('./package.json').version")
          PUBLISHED=$(npm view @tollerud/ui version 2>/dev/null || echo "0.0.0")
          echo "local=$LOCAL" >> $GITHUB_OUTPUT
          echo "published=$PUBLISHED" >> $GITHUB_OUTPUT
          if [ "$LOCAL" = "$PUBLISHED" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "Version $LOCAL already on npm — skipping publish."
          else
            echo "skip=false" >> $GITHUB_OUTPUT
            echo "Publishing $LOCAL (was $PUBLISHED)."
          fi

      - run: npm run typecheck
        if: steps.version_check.outputs.skip == 'false'

      - run: npm run lint
        if: steps.version_check.outputs.skip == 'false'

      - run: npm run test
        if: steps.version_check.outputs.skip == 'false'

      - run: npm run build
        if: steps.version_check.outputs.skip == 'false'

      - run: npm run test:subpath
        if: steps.version_check.outputs.skip == 'false'

      - run: npm run test:drift
        if: steps.version_check.outputs.skip == 'false'

      - run: npm run test:package
        if: steps.version_check.outputs.skip == 'false'

      - run: npm run test:size
        if: steps.version_check.outputs.skip == 'false'

      - run: npm run build:docs
        if: steps.version_check.outputs.skip == 'false'

      - run: npx playwright install chromium --with-deps
        if: steps.version_check.outputs.skip == 'false'

      - run: npm run test:e2e
        if: steps.version_check.outputs.skip == 'false'

      # Do not use --provenance with a classic NPM_TOKEN — npm returns E404 on
      # scoped packages. Re-enable after configuring Trusted Publishers (OIDC) on npmjs.com.
      - name: Publish to npm
        if: steps.version_check.outputs.skip == 'false'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public

      - name: Create GitHub Release
        if: steps.version_check.outputs.skip == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=${{ steps.version_check.outputs.local }}
          gh release create "v${VERSION}" \
            --title "v${VERSION}" \
            --generate-notes
