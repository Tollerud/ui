name: Publish npm package

on:
  push:
    branches: [main]
    paths:
      - 'package.json'
      - 'package-lock.json'
      - 'components/**'
      - 'lib/**'
      - 'types/**'
      - 'globals.css'
      - 'globals-v3.css'
      - 'globals-layers.css'
      - 'tokens.css'
      - 'source.css'
      - 'tailwind.css'
      - 'tollerud-preset.cjs'
      - 'tsup.config.ts'
      - 'tsconfig.build.json'
      - 'vitest.config.ts'
      - 'eslint.config.js'
      - 'test/**'
      - 'registry.json'
      - 'packages/footer/**'
      - 'fixtures/consumer/**'
      - 'scripts/test-consumer.mjs'
      - 'scripts/verify-footer-sync.mjs'
      - 'scripts/sync-footer-package.mjs'
  workflow_dispatch:

# Queue overlapping runs so a later push waits for an in-flight publish to finish,
# then the version check can skip instead of racing npm publish.
concurrency:
  group: publish-npm-${{ github.repository }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - run: npm ci

      - run: npm run sync:registry

      - name: Check if version already published
        id: version_check
        run: |
          LOCAL=$(node -p "require('./package.json').version")
          PUBLISHED=$(npm view @tollerud/ui version 2>/dev/null || echo "0.0.0")
          FOOTER_PUBLISHED=$(npm view @tollerud/footer version 2>/dev/null || echo "0.0.0")
          echo "local=$LOCAL" >> $GITHUB_OUTPUT
          echo "published=$PUBLISHED" >> $GITHUB_OUTPUT
          echo "footer_published=$FOOTER_PUBLISHED" >> $GITHUB_OUTPUT
          if [ "$LOCAL" = "$PUBLISHED" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "Version $LOCAL already on npm — skipping publish."
          else
            echo "skip=false" >> $GITHUB_OUTPUT
            echo "Publishing $LOCAL (was $PUBLISHED)."
          fi

      - run: npm run typecheck
        if: steps.version_check.outputs.skip == 'false'

      - run: npm run lint
        if: steps.version_check.outputs.skip == 'false'

      - run: npm run test
        if: steps.version_check.outputs.skip == 'false'

      - run: npm run build
        if: steps.version_check.outputs.skip == 'false'

      - run: npm run test:subpath
        if: steps.version_check.outputs.skip == 'false'

      - run: npm run test:drift
        if: steps.version_check.outputs.skip == 'false'

      - run: npm run test:package
        if: steps.version_check.outputs.skip == 'false'

      - run: npm run test:size
        if: steps.version_check.outputs.skip == 'false'

      - run: npm run test:props
        if: steps.version_check.outputs.skip == 'false'

      - run: npm run verify:footer-sync
        if: steps.version_check.outputs.skip == 'false'

      - run: npm run sync:footer
        if: steps.version_check.outputs.skip == 'false'

      - name: Build @tollerud/footer
        if: steps.version_check.outputs.skip == 'false'
        working-directory: packages/footer
        run: |
          npm install
          npm run build

      - run: npm run test:consumer
        if: steps.version_check.outputs.skip == 'false'

      - run: npm run build:docs
        if: steps.version_check.outputs.skip == 'false'

      - run: npx playwright install chromium --with-deps
        if: steps.version_check.outputs.skip == 'false'

      - run: npm run test:e2e
        if: steps.version_check.outputs.skip == 'false'

      - name: Re-check version before publish
        id: pre_publish
        if: steps.version_check.outputs.skip == 'false'
        run: |
          LOCAL=$(node -p "require('./package.json').version")
          PUBLISHED=$(npm view @tollerud/ui version 2>/dev/null || echo "0.0.0")
          if [ "$LOCAL" = "$PUBLISHED" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "Version $LOCAL reached npm during CI — skipping publish."
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      # Requires Trusted Publishers (OIDC) on npmjs.com for Tollerud/ui + @tollerud/* packages.
      # See: https://docs.npmjs.com/trusted-publishers
      - name: Publish @tollerud/ui to npm
        if: steps.version_check.outputs.skip == 'false' && steps.pre_publish.outputs.skip != 'true'
        run: |
          set -e
          if ! npm publish --provenance --access public; then
            LOCAL=$(node -p "require('./package.json').version")
            PUBLISHED=$(npm view @tollerud/ui version 2>/dev/null || echo "0.0.0")
            if [ "$LOCAL" = "$PUBLISHED" ]; then
              echo "Version $LOCAL already on npm — treating as success."
            else
              exit 1
            fi
          fi

      - name: Publish @tollerud/footer to npm
        if: steps.version_check.outputs.skip == 'false' && steps.pre_publish.outputs.skip != 'true'
        working-directory: packages/footer
        run: |
          set -e
          if ! npm publish --provenance --access public; then
            LOCAL=$(node -p "require('./package.json').version")
            PUBLISHED=$(npm view @tollerud/footer version 2>/dev/null || echo "0.0.0")
            if [ "$LOCAL" = "$PUBLISHED" ]; then
              echo "Version $LOCAL already on npm — treating as success."
            else
              exit 1
            fi
          fi

      - name: Create GitHub Release
        if: steps.version_check.outputs.skip == 'false' && steps.pre_publish.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=${{ steps.version_check.outputs.local }}
          if gh release view "v${VERSION}" >/dev/null 2>&1; then
            echo "Release v${VERSION} already exists — skipping."
          else
            gh release create "v${VERSION}" \
              --title "v${VERSION}" \
              --generate-notes
          fi

      - name: Publish skipped
        if: steps.version_check.outputs.skip == 'true' || steps.pre_publish.outputs.skip == 'true'
        run: echo "No new version to publish."
