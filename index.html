<!doctype html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Tollerud User Interface</title>
<link rel="icon" href="tollerud-logo.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">

<!-- Tailwind Play CDN — configured with the Tollerud palette so demo utilities resolve -->
<script src="https://cdn.tailwindcss.com/3.4.16"></script>
<script>
  tailwind.config = {
    darkMode: ['selector', '[data-theme="dark"]'],
    theme: {
      extend: {
        colors: {
          tollerud: {
            yellow: '#E8D500', 'yellow-bright': '#FFFF00', acid: '#FFFF00',
            'yellow-dim': '#B8A800', amber: '#FFB800', 'amber-glow': '#FF8C00',
            black: '#0A0A0A', 'noir-900': '#121212', 'noir-800': '#1A1A1A',
            'noir-700': '#252525', 'noir-600': '#333333', 'noir-500': '#4A4A4A',
            'noir-400': '#666666', 'noir-300': '#888888', 'noir-200': '#AAAAAA',
            'noir-100': '#CCCCCC', 'noir-50': '#E5E5E5', white: '#F5F5F5',
            success: '#22C55E', warning: '#E8D500', error: '#EF4444', info: '#3B82F6',
          },
        },
        fontFamily: {
          sans: ['Inter', 'system-ui', 'sans-serif'],
          mono: ['JetBrains Mono', 'monospace'],
        },
      },
    },
    corePlugins: { preflight: false },
  };
</script>

<!-- System tokens + component classes from the repo -->
<link rel="stylesheet" href="globals.css">
<!-- Docs chrome, authored light theme, and extended component styles -->
<link rel="stylesheet" href="docs/docs.css">
</head>
<body>
<div id="root"></div>
<script>
  // Restore path after GitHub Pages 404 redirect
  (function() {
    var p = sessionStorage.getItem("spa-redirect");
    if (p) { sessionStorage.removeItem("spa-redirect"); history.replaceState(null, "", p); }
  })();
</script>
